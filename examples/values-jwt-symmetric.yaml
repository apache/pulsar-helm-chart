auth:
  authentication:
    enabled: true
    jwt:
      # Enable JWT authentication
      enabled: true
      # The token is generated from a symmetric secret key, so set usingSecretKey to true.
      # (Set it to false when signing tokens with an asymmetric private key.)
      usingSecretKey: true
      # Generate the JWT signing key and one token per superuser in-chart, via a
      # pre-install/pre-upgrade hook job. This removes the need to run
      # prepare_helm_release.sh (or any out-of-band script) before installing, so a
      # fully-authenticated cluster can be deployed with a single `helm install`.
      # See https://github.com/apache/pulsar-helm-chart#in-chart-jwt-secret-generation
      generateSecrets:
        enabled: true
  authorization:
    enabled: true
  superUsers:
    # broker to broker communication
    broker: "broker-admin"
    # proxy to broker communication
    proxy: "proxy-admin"
    # pulsar-admin client to broker/proxy communication
    client: "admin"