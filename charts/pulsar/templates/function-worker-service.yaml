{{- if and .Values.components.function_worker (not .Values.standalone.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ template "pulsar.function_worker.service" . }}"
  namespace: {{ template "pulsar.namespace" . }}
  labels:
    {{- include "pulsar.standardLabels" . | nindent 4 }}
    component: {{ .Values.function_worker.component }}
{{- with .Values.function_worker.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: ClusterIP
  ports:
  # prometheus needs to access /metrics endpoint
  - name: http
    port: {{ .Values.function_worker.ports.http }}
  {{- if and .Values.tls.enabled .Values.tls.function_worker.enabled }}
  - name: https
    port: {{ .Values.function_worker.ports.https }}
  {{- end }}
  selector:
    {{- include "pulsar.matchLabels" . | nindent 4 }}
    component: {{ .Values.function_worker.component }}
{{- end }}
