{{- if .Values.standalone.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.standalone.component }}"
  namespace: {{ template "pulsar.namespace" . }}
  annotations: {{ .Values.standalone.appAnnotations | toYaml | nindent 4 }}
  labels:
    {{- include "pulsar.standardLabels" . | nindent 4 }}
    component: {{ .Values.standalone.component }}
spec:
  serviceName: "{{ template "pulsar.standalone.service.headless" . }}"
  replicas: {{ .Values.standalone.replicaCount }}
  selector:
    matchLabels:
      {{- include "pulsar.matchLabels" . | nindent 6 }}
      component: {{ .Values.standalone.component }}
  updateStrategy: {{ .Values.standalone.updateStrategy | toYaml | nindent 4 }}
  podManagementPolicy: OrderedReady
  template:
    metadata:
      labels:
        {{- include "pulsar.template.labels" . | nindent 8 }}
        component: {{ .Values.standalone.component }}
      annotations:
        {{- if not .Values.standalone.podMonitor.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.standalone.ports.http }}"
        {{- end }}
        {{- if .Values.standalone.restartPodsOnConfigMapChange }}
        checksum/config: {{ include (print $.Template.BasePath "/standalone-configmap.yaml") . | sha256sum }}
        {{- end }}
{{- with .Values.standalone.annotations }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: "{{ template "pulsar.fullname" . }}-{{ .Values.standalone.component }}-acct"
    {{- if .Values.standalone.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.standalone.nodeSelector | indent 8 }}
    {{- end }}
    {{- if .Values.standalone.tolerations }}
      tolerations:
{{ toYaml .Values.standalone.tolerations | indent 8 }}
    {{- end }}
      affinity:
        {{- if and .Values.affinity.anti_affinity .Values.standalone.affinity.anti_affinity }}
        podAntiAffinity:
          {{- if eq .Values.standalone.affinity.type "requiredDuringSchedulingIgnoredDuringExecution" }}
          {{ .Values.standalone.affinity.type }}:
          - labelSelector:
              matchExpressions:
              - key: "app"
                operator: In
                values:
                - "{{ template "pulsar.name" . }}"
              - key: "release"
                operator: In
                values:
                - {{ .Release.Name }}
              - key: "component"
                operator: In
                values:
                - {{ .Values.standalone.component }}
            topologyKey: {{ .Values.standalone.affinity.anti_affinity_topology_key }}
          {{- else }}
          {{ .Values.standalone.affinity.type }}:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: "app"
                      operator: In
                      values:
                      - "{{ template "pulsar.name" . }}"
                    - key: "release"
                      operator: In
                      values:
                      - {{ .Release.Name }}
                    - key: "component"
                      operator: In
                      values:
                      - {{ .Values.standalone.component }}
                topologyKey: {{ .Values.standalone.affinity.anti_affinity_topology_key }}
          {{- end }}
        {{- end }}
      terminationGracePeriodSeconds: {{ .Values.standalone.gracePeriod }}
      initContainers:
      {{- if .Values.standalone.initContainers }}
        {{- toYaml .Values.standalone.initContainers | nindent 6 }}
      {{- end }}
      containers:
      - name: "{{ template "pulsar.fullname" . }}-{{ .Values.standalone.component }}"
        image: "{{ template "pulsar.imageFullName" (dict "image" .Values.images.standalone "root" .) }}"
        imagePullPolicy: "{{ template "pulsar.imagePullPolicy" (dict "image" .Values.images.standalone "root" .) }}"
        {{- if .Values.standalone.probe.liveness.enabled }}
        livenessProbe:
          tcpSocket:
            port: {{ .Values.standalone.ports.http }}
          initialDelaySeconds: {{ .Values.standalone.probe.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.standalone.probe.liveness.periodSeconds }}
          timeoutSeconds: {{ .Values.standalone.probe.liveness.timeoutSeconds }}
          failureThreshold: {{ .Values.standalone.probe.liveness.failureThreshold }}
        {{- end }}
        {{- if .Values.standalone.probe.readiness.enabled }}
        readinessProbe:
          tcpSocket:
            port: {{ .Values.standalone.ports.http }}
          initialDelaySeconds: {{ .Values.standalone.probe.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.standalone.probe.readiness.periodSeconds }}
          timeoutSeconds: {{ .Values.standalone.probe.readiness.timeoutSeconds }}
          failureThreshold: {{ .Values.standalone.probe.readiness.failureThreshold }}
        {{- end }}
        {{- if .Values.standalone.probe.startup.enabled }}
        startupProbe:
          tcpSocket:
            port: {{ .Values.standalone.ports.http }}
          initialDelaySeconds: {{ .Values.standalone.probe.startup.initialDelaySeconds }}
          periodSeconds: {{ .Values.standalone.probe.startup.periodSeconds }}
          timeoutSeconds: {{ .Values.standalone.probe.startup.timeoutSeconds }}
          failureThreshold: {{ .Values.standalone.probe.startup.failureThreshold }}
        {{- end }}
      {{- if .Values.standalone.resources }}
        resources:
{{ toYaml .Values.standalone.resources | indent 10 }}
      {{- end }}
        command: ["sh", "-c"]
        args:
        - |
        {{- if .Values.standalone.additionalCommand }}
          {{ .Values.standalone.additionalCommand }}
        {{- end }}
          bin/apply-config-from-env.py conf/standalone.conf;
          bin/gen-yml-from-env.py conf/functions_worker.yml;
          echo "OK" > "${statusFilePath:-status}";
          OPTS="${OPTS} -Dlog4j2.formatMsgNoLookups=true" exec bin/pulsar standalone \
            --advertised-address "{{ template "pulsar.standalone.hostname" . }}" \
            {{- if not .Values.components.functions }}
            --no-functions-worker \
            --no-stream-storage \
            {{- end }}
            ;
        ports:
        - name: http
          containerPort: {{ .Values.standalone.ports.http }}
        {{- if not .Values.tls.enabled }}
        - name: "{{ .Values.tcpPrefix }}pulsar"
          containerPort: {{ .Values.standalone.ports.pulsar }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: https
          containerPort: {{ .Values.standalone.ports.https }}
        - name: "{{ .Values.tlsPrefix }}pulsarssl"
          containerPort: {{ .Values.standalone.ports.pulsarssl }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: "{{ template "pulsar.fullname" . }}-{{ .Values.standalone.component }}"
        volumeMounts:
          - name: "{{ template "pulsar.fullname" . }}-{{ .Values.standalone.component }}-{{ .Values.standalone.volumes.data.name }}"
            mountPath: /pulsar/data
          {{- if .Values.auth.authentication.enabled }}
          {{- if .Values.auth.authentication.jwt.enabled }}
          - mountPath: "/pulsar/keys"
            name: token-keys
            readOnly: true
          - mountPath: "/pulsar/tokens"
            name: client-token
            readOnly: true
          {{- end }}
          {{- end }}
          {{- if .Values.standalone.extraVolumeMounts }}
{{ toYaml .Values.standalone.extraVolumeMounts | indent 10 }}
          {{- end }}
          {{- include "pulsar.standalone.certs.volumeMounts" . | nindent 10 }}
        {{- if .Values.standalone.extraEnvs }}
{{- toYaml .Values.standalone.extraEnvs | nindent 10 }}
        {{- end }}
      volumes:
      {{- if .Values.standalone.extraVolumes }}
{{ toYaml .Values.standalone.extraVolumes | indent 6 }}
      {{- end }}
      {{- if .Values.auth.authentication.enabled }}
      {{- if .Values.auth.authentication.jwt.enabled }}
      - name: token-keys
        secret:
          {{- if not .Values.auth.authentication.jwt.usingSecretKey }}
          secretName: "{{ .Release.Name }}-token-asymmetric-key"
          {{- end}}
          {{- if .Values.auth.authentication.jwt.usingSecretKey }}
          secretName: "{{ .Release.Name }}-token-symmetric-key"
          {{- end}}
          items:
            {{- if .Values.auth.authentication.jwt.usingSecretKey }}
            - key: SECRETKEY
              path: token/secret.key
            {{- else }}
            - key: PUBLICKEY
              path: token/public.key
            {{- end}}
      - name: client-token
        secret:
          secretName: "{{ .Release.Name }}-token-{{ .Values.auth.superUsers.client }}"
          items:
            - key: TOKEN
              path: client/token
      {{- end}}
      {{- end}}
      {{- include "pulsar.standalone.certs.volumes" . | nindent 6 }}
      {{- include "pulsar.imagePullSecrets" . | nindent 6}}
  volumeClaimTemplates:
  - metadata:
      name: "{{ template "pulsar.fullname" . }}-{{ .Values.standalone.component }}-{{ .Values.standalone.volumes.data.name }}"
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.standalone.volumes.data.size }}
    {{- if or .Values.standalone.volumes.data.storageClassName .Values.volumes.local_storage }}
      {{- if .Values.standalone.volumes.data.storageClassName }}
      storageClassName: "{{ .Values.standalone.volumes.data.storageClassName }}"
      {{- end }}
      {{- if .Values.volumes.local_storage }}
      storageClassName: "local-storage"
      {{- end }}
    {{- end }}
    {{- if .Values.standalone.volumes.data.selector }}
      selector:
{{ toYaml .Values.standalone.volumes.data.selector | indent 8 }}
    {{- end }}
{{- end }}
