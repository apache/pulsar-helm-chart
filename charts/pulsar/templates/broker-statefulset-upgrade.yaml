# only when `components.broker` is true and `broker.statefulsetUpgrade.enabled` is true,
# this pre-upgrade hook job will be created to clean up the old broker statefulset if the existing statefulset is created 
# by a chart older than 4.6.0, which has a different headless service name and will cause issue if not deleted before
# the new statefulset is created.
{{- if and .Values.components.broker (not .Values.standalone.enabled) .Values.broker.statefulsetUpgrade.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.broker.component }}-sts-cleanup"
  namespace: {{ template "pulsar.namespace" . }}
  labels:
    {{- include "pulsar.standardLabels" . | nindent 4 }}
    component: {{ .Values.broker.component }}-sts-cleanup
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.broker.component }}-sts-cleanup"
  namespace: {{ template "pulsar.namespace" . }}
  labels:
    {{- include "pulsar.standardLabels" . | nindent 4 }}
    component: {{ .Values.broker.component }}-sts-cleanup
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["list", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.broker.component }}-sts-cleanup"
  namespace: {{ template "pulsar.namespace" . }}
  labels:
    {{- include "pulsar.standardLabels" . | nindent 4 }}
    component: {{ .Values.broker.component }}-sts-cleanup
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded
subjects:
  - kind: ServiceAccount
    name: "{{ template "pulsar.fullname" . }}-{{ .Values.broker.component }}-sts-cleanup"
roleRef:
  kind: Role
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.broker.component }}-sts-cleanup"
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.broker.component }}-sts-cleanup"
  namespace: {{ template "pulsar.namespace" . }}
  labels:
    {{- include "pulsar.standardLabels" . | nindent 4 }}
    component: {{ .Values.broker.component }}-sts-cleanup
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: "{{ template "pulsar.fullname" . }}-{{ .Values.broker.component }}-sts-cleanup"
      restartPolicy: Never
      {{- include "pulsar.imagePullSecrets" . | nindent 6 }}
    {{- if .Values.broker.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.broker.nodeSelector | indent 8 }}
    {{- end }}
    {{- if .Values.broker.priorityClassName }}
      priorityClassName: {{ .Values.broker.priorityClassName }}
    {{- end }}
    {{- if .Values.broker.tolerations }}
      tolerations:
{{ toYaml .Values.broker.tolerations | indent 8 }}
    {{- end }}
    {{- if .Values.broker.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.broker.topologySpreadConstraints | nindent 8 }}
    {{- end }}
      affinity:
        {{- if .Values.broker.affinity.node_affinity}}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.broker.affinity.node_affinity.matchExpression.key }}
                operator: {{ .Values.broker.affinity.node_affinity.matchExpression.operator }}
                values:
                {{- range .Values.broker.affinity.node_affinity.matchExpression.values }}
                - {{ . }}
                {{- end }}
        {{- end }}
        {{- if and .Values.affinity.anti_affinity .Values.broker.affinity.anti_affinity}}
        podAntiAffinity:
          {{- if eq .Values.broker.affinity.type "requiredDuringSchedulingIgnoredDuringExecution"}}
          {{ .Values.broker.affinity.type }}:
          - labelSelector:
              matchExpressions:
              - key: "app"
                operator: In
                values:
                - "{{ template "pulsar.name" . }}"
              - key: "release"
                operator: In
                values:
                - {{ .Release.Name }}
              - key: "component"
                operator: In
                values:
                - {{ .Values.broker.component }}
            topologyKey: {{ .Values.broker.affinity.anti_affinity_topology_key }}
          {{- else }}
          {{ .Values.broker.affinity.type }}:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: "app"
                      operator: In
                      values:
                      - "{{ template "pulsar.name" . }}"
                    - key: "release"
                      operator: In
                      values:
                      - {{ .Release.Name }}
                    - key: "component"
                      operator: In
                      values:
                      - {{ .Values.broker.component }}
                topologyKey: {{ .Values.broker.affinity.anti_affinity_topology_key }}
          {{- end }}
        {{- end }}
      containers:
        - name: sts-cleanup
          image: "{{ template "pulsar.imageFullName" (dict "image" .Values.images.kubectl "root" .) }}"
          imagePullPolicy: "{{ template "pulsar.imagePullPolicy" (dict "image" .Values.images.kubectl "root" .) }}"
          command:
            - sh
            - -c
            - |
              STS="{{ template "pulsar.fullname" . }}-{{ .Values.broker.component }}"
              CHART_LABEL=$(kubectl get statefulset "$STS" -o jsonpath='{.metadata.labels.chart}' 2>/dev/null || true)
              if [ -z "$CHART_LABEL" ]; then
                echo "StatefulSet $STS not found or has no chart label, skipping delete"
                exit 0
              fi
              VERSION="${CHART_LABEL#pulsar-}"
              MAJOR="$(echo "$VERSION" | cut -d. -f1)"
              MINOR="$(echo "$VERSION" | cut -d. -f2)"
              if [ "$MAJOR" -lt 4 ] || { [ "$MAJOR" -eq 4 ] && [ "$MINOR" -lt 6 ]; }; then
                echo "Chart version $CHART_LABEL is older than pulsar-4.6.0, deleting StatefulSet $STS"
                kubectl delete statefulset "$STS" --cascade=orphan --ignore-not-found
              else
                echo "Chart version $CHART_LABEL is 4.6.0 or newer, skipping delete"
              fi
            {{- if .Values.extraInitCommand }}
              {{ .Values.extraInitCommand }}
            {{- end }}
{{- end }}