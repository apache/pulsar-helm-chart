# RBAC for the standalone function worker. The Kubernetes runtime spawns one pod per function
# instance, so the worker needs permission to manage pods/services/configmaps/statefulsets in the
# job namespace (or cluster-wide when rbac.limit_to_namespace is false).
{{- if and .Values.components.function_worker (not .Values.standalone.enabled) }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.function_worker.rbac.limit_to_namespace }}
kind: Role
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.function_worker.component }}-role"
  namespace: {{ template "pulsar.namespace" . }}
{{- else }}
kind: ClusterRole
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.function_worker.component }}"
{{- end }}
  labels:
    {{- include "pulsar.standardLabels" . | nindent 4 }}
    component: {{ .Values.function_worker.component }}
rules:
- apiGroups: [""]
  resources:
  - services
  - configmaps
  - pods
  verbs:
  - '*'
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.function_worker.rbac.limit_to_namespace }}
kind: RoleBinding
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.function_worker.component }}-rolebinding"
  namespace: {{ template "pulsar.namespace" . }}
{{- else }}
kind: ClusterRoleBinding
metadata:
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.function_worker.component }}"
{{- end }}
  labels:
    {{- include "pulsar.standardLabels" . | nindent 4 }}
    component: {{ .Values.function_worker.component }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
{{- if .Values.function_worker.rbac.limit_to_namespace }}
  kind: Role
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.function_worker.component }}-role"
{{- else }}
  kind: ClusterRole
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.function_worker.component }}"
{{- end }}
subjects:
- kind: ServiceAccount
  name: "{{ template "pulsar.fullname" . }}-{{ .Values.function_worker.component }}-acct"
  namespace: {{ template "pulsar.namespace" . }}
{{- end }}
